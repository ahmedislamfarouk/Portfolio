<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Welcome</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Discover my latest projects and professional journey as a developer.">
</head>
<body>
    <div class="background-blob blob-1"></div>
    <div class="background-blob blob-2"></div>
    
    <main class="container">
        <!-- Header -->
        <header id="main-header">
            <nav class="glass-nav">
                <div class="logo">PORTFOLIO</div>
                <ul class="nav-links">
                    <li><a href="#about" class="nav-item">About</a></li>
                    <li><a href="#projects" class="nav-item">Projects</a></li>
                    <li><a href="#contact" class="nav-item">Contact</a></li>
                </ul>
            </nav>
        </header>

        <!-- Hero Section -->
        <section id="hero">
            <div class="hero-content">
                <h1 class="fade-in">Hi, I'm <span class="highlight">Ahmed</span>.</h1>
                <p class="subtitle fade-in-delayed">A passionate developer crafting premium digital experiences.</p>
                <div class="cta-buttons">
                    <a href="#projects" class="btn btn-primary">View Projects</a>
                    <a href="#contact" class="btn btn-secondary">Get in Touch</a>
                </div>
            </div>
            <!-- Interactive element placeholder -->
            <div class="hero-visual">
                <div class="floating-card">
                    <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=1000&q=80" alt="Code Visual" class="hero-img">
                </div>
            </div>
        </section>

        <!-- Portfolio Grid -->
        <section id="projects">
            <h2 class="section-title">Latest Works</h2>
            <div class="projects-grid">
                <div class="project-card glass">
                    <div class="project-info">
                        <h3>Project One</h3>
                        <p>Modern web application with focus on performance.</p>
                        <a href="#" class="project-link">Learn More &rarr;</a>
                    </div>
                </div>
                <!-- Feel free to add more project cards -->
            </div>
        </section>

        <footer id="footer">
            <p>&copy; 2024 Portfolio | Built with ❤️</p>
        </footer>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
